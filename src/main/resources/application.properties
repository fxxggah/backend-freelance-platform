# ============================================
# SERVER
# ============================================
server.port=8080

# ============================================
# SPRING
# ============================================
spring.application.name=freelance-platform
spring.main.allow-circular-references=true

# ============================================
# DATABASE - MYSQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/freelance_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT
# ============================================
app.jwt.secret=FreelancePlatformSecretKey2024TCCSuperSecretKeyMustBeLongEnoughForHS256
app.jwt.expiration=86400000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081