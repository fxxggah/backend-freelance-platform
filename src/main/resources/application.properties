# ============================================
# SERVER
# ============================================
server.port=8080

# ============================================
# SPRING
# ============================================
spring.application.name=freelance-platform
spring.main.allow-circular-references=true

# ============================================
# DATABASE H2 (Em memˇria - para desenvolvimento)
# ============================================
spring.datasource.url=jdbc:h2:mem:freelancedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# H2 CONSOLE (Interface grßfica no browser)
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# JWT
# ============================================
app.jwt.secret=FreelancePlatformSecretKey2024TCCSuperSecretKeyMustBeLongEnoughForHS256
app.jwt.expiration=86400000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081